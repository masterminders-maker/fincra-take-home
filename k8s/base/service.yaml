apiVersion: v1
kind: Service
metadata:
  name: fincra-app
  labels:
    app.kubernetes.io/name: fincra-app
spec:
  # ClusterIP is correct here — the ALB Controller targets pods directly
  # (IP target type) in Fargate, so the Service is just for selector glue.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fincra-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
