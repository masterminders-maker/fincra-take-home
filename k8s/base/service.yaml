apiVersion: v1
kind: Service
metadata:
  name: fincra-app
  labels:
    app.kubernetes.io/name: fincra-app
spec:
  # ClusterIP is intentional. The ALB talks directly to pod IPs, not through
  # the Service — so the Service is really just here to give the Ingress a
  # selector to match pods against. No need for NodePort or LoadBalancer.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fincra-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
