apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fincra-app
  annotations:
    # These three annotations are what actually make the ALB Controller do
    # something useful. `internet-facing` puts the ALB in the public subnets,
    # and `ip` target type routes traffic straight to pod IPs — you have to use
    # `ip` on Fargate because there are no EC2 nodes to target by instance.
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fincra-app
                port:
                  number: 80