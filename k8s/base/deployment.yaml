apiVersion: apps/v1
kind: Deployment
metadata:
  name: fincra-app
  labels:
    app.kubernetes.io/name: fincra-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fincra-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fincra-app
    spec:
      containers:
        - name: web
          # Don't edit the tag here — the dev overlay overrides it.
          # CI writes the real git-SHA tag there on every push, and Argo CD
          # picks it up and rolls out automatically.
          image: ghcr.io/YOUR_GITHUB_USER/fincra-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi