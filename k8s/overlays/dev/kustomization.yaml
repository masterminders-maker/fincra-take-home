apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - ../../base

# This is the image override for the dev environment. The tag starts as
# `latest` but CI rewrites it to the actual git SHA on every push using
# `kustomize edit set image` — so what you see committed here is always
# the last successfully built image.
#
# Once you've deployed, swap the placeholder name for your real ECR URI, e.g.:
#   675344693525.dkr.ecr.us-east-1.amazonaws.com/fincra-app
images:
  - name: ghcr.io/masterminders-maker/fincra-app
    newName: ghcr.io/masterminders-maker/fincra-app
    newTag: latest

patches:
  - path: replica-patch.yaml
    target:
      kind: Deployment
      name: fincra-app

commonLabels:
  environment: dev
