name: config

# Runs on every push to main and kicks off the full deploy pipeline.
#
# The four jobs run in order:
#   1. lint-and-test  — catches broken CDK code and bad manifests before
#                       we spend any real time or money touching AWS.
#   2. build-and-push — builds the Docker image and pushes it to ECR,
#                       tagged with the first 7 chars of the git SHA.
#   3. deploy-infra   — runs `cdk deploy` for both stacks. Safe to re-run;
#                       CDK figures out what actually changed.
#   4. bump-image     — updates the image tag in the dev kustomize overlay
#                       and commits it back to main. Argo CD sees the commit
#                       and rolls out the new image on its own — no kubectl.
#
# After step 3 everything is GitOps. CI only commits a file; the cluster
# does the rest.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# id-token:write is what lets GitHub mint the OIDC token that AWS trusts.
# Without it, the aws-actions/configure-aws-credentials step just fails.
# No static AWS keys stored anywhere — federation all the way.
permissions:
  id-token: write
  contents: write        # bump-image job commits the tag bump back to main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fincra-app
  # Before you run this for the first time, set these two in the repo's
  # GitHub Actions → Variables (not Secrets — they're not sensitive values):
  #   AWS_DEPLOY_ROLE_ARN  — the IAM role this repo is allowed to assume via OIDC
  #   AWS_ACCOUNT_ID       — the target AWS account number

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint + sanity checks — we want to catch silly mistakes here, not after
  #    we've already started touching AWS resources.
  # ---------------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CDK deps
        working-directory: infra
        run: pip install -r requirements.txt

      - name: Install CDK CLI
        run: npm install -g aws-cdk@2

      - name: CDK syntax check
        working-directory: infra
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          # Quick syntax check — doesn't run CDK, just makes sure the files parse
          import py_compile
          py_compile.compile('app.py', doraise=True)
          py_compile.compile('stacks/network_stack.py', doraise=True)
          py_compile.compile('stacks/eks_stack.py', doraise=True)
          print('CDK code: syntactically valid')
          "

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Kustomize build sanity
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize build k8s/overlays/dev > /tmp/rendered.yaml
          # Make sure the rendered output actually has what we expect
          grep -q "kind: Deployment" /tmp/rendered.yaml
          grep -q "kind: Service" /tmp/rendered.yaml
          grep -q "kind: Ingress" /tmp/rendered.yaml
          echo "kustomize build: OK"

  # ---------------------------------------------------------------------------
  # 2. Build and push — image gets tagged with the short git SHA so every
  #    build is uniquely traceable back to the commit that produced it.
  # ---------------------------------------------------------------------------
  build-and-push:
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" \
                 --image-scanning-configuration scanOnPush=true

      - name: Build and push image
        run: |
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${{ steps.meta.outputs.tag }}"
          docker build -t "$IMAGE_URI" ./app
          docker push "$IMAGE_URI"
          echo "Pushed: $IMAGE_URI"

  # ---------------------------------------------------------------------------
  # 3. Deploy infrastructure — runs `cdk deploy` for both stacks. CDK diffs
  #    against the current state, so re-running this on an unchanged stack
  #    is a no-op. Safe to run on every push.
  # ---------------------------------------------------------------------------
  deploy-infra:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK
        run: npm install -g aws-cdk@2

      - name: Install CDK Python deps
        working-directory: infra
        run: pip install -r requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK bootstrap (safe to re-run — skips if the bootstrap stack already exists)
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: cdk bootstrap "aws://${{ vars.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}"

      - name: CDK deploy
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: cdk deploy --all --require-approval never

  # ---------------------------------------------------------------------------
  # 4. Bump the image tag — writes the new SHA tag into the dev kustomize
  #    overlay and commits it back to main. Argo CD picks up the commit
  #    and rolls out the new image. No kubectl, no imperative applies.
  # ---------------------------------------------------------------------------
  bump-image:
    needs: [build-and-push, deploy-infra]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR (for the registry URL)
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update image tag in dev overlay
        run: |
          cd k8s/overlays/dev
          IMAGE="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}"
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          kustomize edit set image "ghcr.io/masterminders-maker/fincra-app=${IMAGE}:${TAG}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No image tag change to commit."
            exit 0
          fi
          git commit -m "ci: bump image to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push